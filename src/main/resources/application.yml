spring:
  autoconfigure:
    exclude:
      - "org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration"
      - "org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration"
  datasource:
    url: "${DB_URL}"
    username: "${DB_USER}"
    password: "${DB_PASSWORD}"
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 900000
      keepalive-time: 60000
      connection-test-query: SELECT 1
      initialization-fail-timeout: -1

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
        temp:
          use_jdbc_metadata_defaults: false

  sql:
    init:
      mode: never

# ── Server ────────────────────────────────────────────────────────────────
server:
  port: ${PORT:8080}
  compression:
    enabled: true

# ── JWT ───────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:V21zQm90SHlkZXJhYmFkMjAyNlNlY3VyZUtleTk4NzY1NDMyMTBBYkNkRWZHaElqS2xNbk9wUXJTdFV2V3hZeg==}
  expiry-hours: ${JWT_EXPIRY_HOURS:24}
  refresh-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:7}

# ── Ollama ────────────────────────────────────────────────────────────────
ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: llama3.2:3b
  temperature: 0.15
  top_p: 0.85

# ── Groq (Tier-2 cloud fallback) ──────────────────────────────────────────
groq:
  api-key: ${GROQ_API_KEY:}
  base-url: https://api.groq.com/openai/v1
  model: llama3-8b-8192
  timeout: 8000

# ── Sarvam AI ─────────────────────────────────────────────────────────────
sarvam:
  api:
    key: ${SARVAM_API_KEY:}
    base-url: "https://api.sarvam.ai" # FIXED: plain string, no markdown
  model: sarvam-m
  timeout: 5000

# ── CORS ──────────────────────────────────────────────────────────────────
cors:
  allowed-origins: "${CORS_ALLOWED_ORIGINS:http://localhost:4200}"

# ── AI Provider ───────────────────────────────────────────────────────────
ai:
  provider: ${AI_PROVIDER:ollama}

# ── Intent Config ─────────────────────────────────────────────────────────
intent:
  quick-response:
    enabled: true

# ── Actuator ──────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  health:
    redis:
      enabled: false

# ── Logging ───────────────────────────────────────────────────────────────
logging:
  level:
    root: WARN
    com.wnsai: INFO
    org.springframework.web: WARN
    com.zaxxer.hikari: WARN
