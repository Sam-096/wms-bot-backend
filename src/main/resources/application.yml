spring:
  autoconfigure:
    exclude:
      - "org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration"
      - "org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration"
  datasource:
    url: "${DB_URL}"
    username: "${DB_USER}"
    password: "${DB_PASSWORD}"
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 900000
      keepalive-time: 60000
      connection-test-query: SELECT 1
      initialization-fail-timeout: -1

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
        temp:
          use_jdbc_metadata_defaults: false

  sql:
    init:
      mode: never

# ── Server ────────────────────────────────────────────────────────────────
server:
  port: ${PORT:8080}
  compression:
    enabled: true

# ── JWT ───────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:V21zQm90SHlkZXJhYmFkMjAyNlNlY3VyZUtleTk4NzY1NDMyMTBBYkNkRWZHaElqS2xNbk9wUXJTdFV2V3hZeg==}
  expiry-hours: ${JWT_EXPIRY_HOURS:24}
  refresh-expiry-days: ${JWT_REFRESH_EXPIRY_DAYS:7}

# ── Ollama ────────────────────────────────────────────────────────────────
ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: llama3.2:3b
  temperature: 0.15
  top_p: 0.85

# ── Groq (Tier-2 cloud fallback) ──────────────────────────────────────────
groq:
  api-key: ${GROQ_API_KEY:}
  base-url: https://api.groq.com/openai/v1
  model: llama-3.1-8b-instant
  timeout: 8000

# ── Sarvam AI ─────────────────────────────────────────────────────────────
sarvam:
  api:
    key: ${SARVAM_API_KEY:}
    base-url: "https://api.sarvam.ai" # FIXED: plain string, no markdown
  model: sarvam-m
  timeout: 5000

# ── CORS ──────────────────────────────────────────────────────────────────
cors:
  allowed-origins: "${CORS_ALLOWED_ORIGINS:http://localhost:4200}"

# ── AI Provider ───────────────────────────────────────────────────────────
ai:
  provider: ${AI_PROVIDER:ollama}

# ── Intent Config ─────────────────────────────────────────────────────────
intent:
  quick-response:
    enabled: true

# ── Greeting guardrail (GreetingGuardrailConfig) ──────────────────────────
# All values below are the production defaults; override on Render if needed.
app:
  intent:
    greeting:
      max-length: 40
      blocked-domain-keywords:
        - warehouse
        - stock
        - vehicle
        - vehicles
        - truck
        - trucks
        - bag
        - bags
        - gate pass
        - gate entry
        - summary
        - report
        - reports
        - commodity
        - commodities
        - count
        - inside
        - loaded
        - unloaded
        - dispatch
        - inward
        - outward
        - inventory
        - grn
        - lot
        - how many
        - how much
        - what is
        - what are
        - show me
        - tell me
        - వేర్ హౌస్
        - గోదాం
        - స్టాక్
        - బ్యాగ్స్
        - బ్యాగులు
        - వాహనాలు
        - ట్రక్
        - గేట్ పాస్
        - సారాంశం
        - రిపోర్ట్
        - లోపల
        - బయట
        - ఎంత
        - ఎన్ని
        - చూపించు
        - ఉంది
        - వచ్చాయి
      allowed-phrases:
        - hi
        - hello
        - hey
        - hii
        - heya
        - sup
        - good morning
        - good evening
        - good night
        - good afternoon
        - namaste
        - namaskar
        - హలో
        - నమస్కారం
        - నమస్తే
        - శుభోదయం
        - నమస్కారం

# ── Actuator ──────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
  health:
    redis:
      enabled: false

# ── Logging ───────────────────────────────────────────────────────────────
logging:
  level:
    root: WARN
    com.wnsai: INFO
    org.springframework.web: WARN
    com.zaxxer.hikari: WARN
