# ─────────────────────────────────────────────────────────────────────────────
# Production profile — overrides from application.yml
# Active via: SPRING_PROFILES_ACTIVE=production
# All secrets must be set as environment variables on Render.
# ─────────────────────────────────────────────────────────────────────────────

spring:
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        temp:
          use_jdbc_metadata_defaults: false
  datasource:
    hikari:
      maximum-pool-size: 5       # Supabase free tier: keep ≤ 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  # ── Redis Cloud (ap-south-1, 30MB free) — set REDIS_URL on Render ──────
  data:
    redis:
      url: ${REDIS_URL:}          # redis://:password@host:port — leave blank to disable
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1
          time-between-eviction-runs: 60s

server:
  port: ${PORT:8080}
  compression:
    enabled: true
  http2:
    enabled: true

# ── JWT (mandatory in production) ─────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}           # MUST be set — minimum 32 bytes Base64-encoded
  expiry-hours: 24
  refresh-expiry-days: 7

# ── Ollama (disabled in cloud — Groq takes over immediately) ──────────────
ollama:
  enabled: false
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  model: llama3.2:3b
  temperature: 0.15
  top_p: 0.85

# ── Groq (primary cloud LLM for Render deployment) ────────────────────────
groq:
  api-key: ${GROQ_API_KEY:}
  base-url: https://api.groq.com/openai/v1
  model: llama3-8b-8192
  timeout: 8000

# ── Sarvam ────────────────────────────────────────────────────────────────
sarvam:
  api:
    key: ${SARVAM_API_KEY:}
    base-url: "https://api.sarvam.ai"
  model: sarvam-m
  timeout: 5000

# ── CORS ──────────────────────────────────────────────────────────────────
cors:
  allowed-origins: "${FRONTEND_URL:https://wmsai.netlify.app}"

# ── Resilience4j — circuit breaker for Groq + Sarvam AI ──────────────────
resilience4j:
  circuitbreaker:
    instances:
      groq:
        sliding-window-size: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
        register-health-indicator: true
      sarvam:
        sliding-window-size: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
        register-health-indicator: true
  timelimiter:
    instances:
      groq:
        timeout-duration: 10s
      sarvam:
        timeout-duration: 15s

# ── Actuator (limited exposure in production) ─────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# ── Logging (minimal in production) ───────────────────────────────────────
logging:
  level:
    root: WARN
    com.wnsai: INFO
    org.springframework.web: WARN
    com.zaxxer.hikari: WARN
