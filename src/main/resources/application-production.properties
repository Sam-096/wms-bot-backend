# ── Server ─────────────────────────────────────────────────────
server.port=8080

# ── Sarvam AI (Indian Language LLM) ───────────────────────────
sarvam.api.key=${SARVAM_API_KEY} 
sarvam.api.base-url=https://api.sarvam.ai
sarvam.model=sarvam-m

# ── Groq AI (English fallback) ────────────────────────────────
groq.api.key=${GROQ_API_KEY}    
groq.model=llama3-8b-8192

# ── Ollama — dummy values (bean needs to init, but never called)
ollama.base-url=http://localhost:11434
ollama.model=llama3.2

# ── Actuator ───────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── CORS ───────────────────────────────────────────────────────
cors.allowed.origins=https://wmsai.netlify.app

# ── Logging ───────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.wnsai=INFO
