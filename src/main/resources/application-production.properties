# ── Server ─────────────────────────────────────────────────────
server.port=8080

# ── Sarvam AI (Indian Language LLM) ───────────────────────────
sarvam.api.key=sk_uc9xau9c_N8n3l66s0XaCsJ6Q7OCRUq5J
sarvam.api.url=https://api.sarvam.ai
sarvam.model=sarvam-m

# ── Groq AI (English fallback) ────────────────────────────────
groq.api.key=${GROQ_API_KEY}
groq.model=llama3-8b-8192

# ── CORS — Allow only your Netlify frontend ───────────────────
cors.allowed.origins=https://wmsai.netlify.app

# ── Actuator (health checks for Render + UptimeRobot) ─────────
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# ── Logging ───────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.wnsai=INFO
